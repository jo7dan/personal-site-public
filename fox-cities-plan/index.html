// Build chart
const chart = document.getElementById('chart');
const maxMiles = 72;
weeks.forEach((w, i) => {
  const bar = document.createElement('div');
  bar.className = 'chart-bar';
  const h = Math.round((w.totalMiles / maxMiles) * 48);
  bar.style.height = h + 'px';
  bar.style.backgroundColor = phaseAccent[w.phase] + '88';
  bar.title = `Week ${w.week}: ${w.totalMiles} miles`;
  bar.addEventListener('click', () => {
    const card = document.getElementById('week-' + i);
    if (card) { card.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
  });
  bar.addEventListener('mouseenter', () => bar.style.backgroundColor = phaseAccent[w.phase]);
  bar.addEventListener('mouseleave', () => bar.style.backgroundColor = phaseAccent[w.phase] + '88');
  chart.appendChild(bar);
});

// Build weeks
const weeksEl = document.getElementById('weeks');
weeks.forEach((week, wi) => {
  const accent = phaseAccent[week.phase];

  const card = document.createElement('div');
  card.className = 'week-card';
  card.id = 'week-' + wi;
  card.style.setProperty('--accent-44', accent + '44');

  // Header
  const header = document.createElement('div');
  header.className = 'week-header';
  header.innerHTML = `
    <div class="week-dot" style="background:${accent}"></div>
    <div class="week-meta">
      <div class="week-title-row">
        <span class="week-num">Week ${week.week}</span>
        <span class="week-dates">${week.dates}</span>
        <span class="week-phase" style="color:${accent}">${week.phase}</span>
      </div>
      <div class="week-goal">${week.goal}</div>
    </div>
    <div class="week-miles-box">
      <div class="week-miles-num" style="color:${accent}">${week.totalMiles}</div>
      <div class="week-miles-label">miles</div>
    </div>
    <div class="week-chevron">▼</div>
  `;
  header.addEventListener('click', () => {
    const isOpen = card.classList.toggle('open');
    header.querySelector('.week-chevron').textContent = isOpen ? '▲' : '▼';
  });

  // Body
  const body = document.createElement('div');
  body.className = 'week-body';

  week.days.forEach((day, di) => {
    const row = document.createElement('div');
    row.className = 'day-row';

    const dh = document.createElement('div');
    dh.className = 'day-header';
    dh.innerHTML = `
      <div class="day-label">${day.day}</div>
      <div class="day-info">
        <div class="day-workout">${day.workout}</div>
        <div class="day-pace">${day.pace}</div>
      </div>
      <div class="day-right">
        <span class="day-mi">${day.miles > 0 ? day.miles + ' mi' : '—'}</span>
        ${day.notes ? '<span class="day-chevron">▼</span>' : ''}
      </div>
    `;

    if (day.notes) {
      const dn = document.createElement('div');
      dn.className = 'day-notes';
      dn.innerHTML = `<div class="day-notes-inner" style="border-left-color:${accent}44">${day.notes}</div>`;
      dh.addEventListener('click', () => {
        const isOpen = row.classList.toggle('open');
        dh.querySelector('.day-chevron').textContent = isOpen ? '▲' : '▼';
      });
      row.appendChild(dh);
      row.appendChild(dn);
    } else {
      row.appendChild(dh);
    }
    body.appendChild(row);
  });

  // Week total
  const wt = document.createElement('div');
  wt.className = 'week-total';
  wt.innerHTML = `<span>Week total: <strong style="color:${accent}">${week.totalMiles} miles</strong></span>`;
  body.appendChild(wt);

  card.appendChild(header);
  card.appendChild(body);
  weeksEl.appendChild(card);
});

// Race strategy
weeksEl.insertAdjacentHTML('beforeend', `
  <div id="race-strategy">
    <div class="strategy-title">Race Day Strategy</div>
    <div class="strategy-body">
      <strong>Miles 1–6:</strong> 6:55/mile — deliberately conservative. The temptation to go faster will be strong. Resist.<br>
      <strong>Miles 7–20:</strong> 6:51/mile — lock in and execute. This should feel controlled, not labored.<br>
      <strong>Miles 21–26.2:</strong> Run by feel. If you've executed the plan, you'll have legs. Push.<br>
      <strong>Fueling:</strong> Every 30–40 minutes from mile 4 onward. Practice this in training. Don't experiment on race day.
    </div>
  </div>
`);
